services:
  - type: web
    name: dodge-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.services.ingestion
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/erp.db
      - key: CORS_ORIGINS
        value: "*"
